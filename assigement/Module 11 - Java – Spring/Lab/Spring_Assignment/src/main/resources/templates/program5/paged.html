<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pagination</title>
</head>
<body>
    <h1>Paginated User List</h1>
    <table border="1">
        <tr><th>ID</th><th>Name</th></tr>
        <tr th:each="c : ${customerPage.content}">
            <td th:text="${c.id}"></td>
            <td th:text="${c.name}"></td>
        </tr>
    </table>
    <div>
        <a th:if="${customerPage.hasPrevious()}" th:href="@{/paged(page=${customerPage.number - 1})}">Previous</a>
        <span>Page <span th:text="${customerPage.number + 1}"></span></span>
        <a th:if="${customerPage.hasNext()}" th:href="@{/paged(page=${customerPage.number + 1})}">Next</a>
    </div>
</body>
</html>

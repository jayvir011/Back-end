<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container" style="max-width: 400px; text-align: center;">
        <h1>Create Account</h1>
        <form th:action="@{/register}" method="post" class="card" style="padding: 2rem; margin-top: 1rem;">
            <input type="text" name="username" placeholder="Username" style="width: 100%; margin-bottom: 1rem; padding: 0.5rem;" required /><br/>
            <input type="password" name="password" placeholder="Password" style="width: 100%; margin-bottom: 1rem; padding: 0.5rem;" required /><br/>
            <button type="submit" class="btn" style="width: 100%;">Register</button>
        </form>
        <p>Already have an account? <a href="/login">Login here</a></p>
    </div>
</body>
</html>

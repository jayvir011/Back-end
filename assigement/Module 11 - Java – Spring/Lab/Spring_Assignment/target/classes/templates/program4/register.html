<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registration</title>
</head>
<body>
    <h1>User Registration</h1>
    <div th:if="${param.success}">Registration Successful!</div>
    <form th:action="@{/register}" th:object="${userRegistration}" method="post">
        Name: <input type="text" th:field="*{name}" />
        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span><br/>
        
        Email: <input type="text" th:field="*{email}" />
        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span><br/>
        
        Password: <input type="password" th:field="*{password}" />
        <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span><br/>
        
        <button type="submit">Register</button>
    </form>
</body>
</html>

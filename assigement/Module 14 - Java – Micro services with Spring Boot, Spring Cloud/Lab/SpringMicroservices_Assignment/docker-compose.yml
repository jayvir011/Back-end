version: '3.8'
services:
  user-service:
    build:
      context: .
      dockerfile: Dockerfile.user
    ports:
      - "8081:8081"
    networks:
      - micro-network

  order-service:
    build:
      context: .
      dockerfile: Dockerfile.order
    ports:
      - "8082:8082"
    environment:
      - USER_SERVICE_HOST=user-service
    depends_on:
      - user-service
    networks:
      - micro-network

networks:
  micro-network:
    driver: bridge

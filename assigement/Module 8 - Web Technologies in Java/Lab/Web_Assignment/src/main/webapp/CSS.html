<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Types Example</title>

    <!-- Internal CSS -->
    <style>
        h2 {
            color: green;
            text-align: center;
        }
    </style>

    <!-- External CSS Link -->
    <link rel="stylesheet" href="ExternalCSS.css">
</head>
<body>
	

    <!-- Inline CSS -->
    <h1 style="color: red; text-align: center;">
        This is Inline CSS
    </h1>

    <!-- Internal CSS -->
    <h2>
        This is Internal CSS
    </h2>

    <!-- External CSS -->
    <p class="external-style">
        This paragraph is styled using External CSS.
    </p>

    <button class="btn">
        Click Me
    </button>

</body>
</html>

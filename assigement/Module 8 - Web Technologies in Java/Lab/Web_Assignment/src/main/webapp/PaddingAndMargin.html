<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Margin and Padding Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        /* Margin Example */
        .margin-box {
            background-color: lightblue;
            margin: 40px;
            padding: 10px;
            border: 2px solid blue;
        }

        /* Padding Example */
        .padding-box {
            background-color: lightgreen;
            padding: 40px;
            margin: 10px;
            border: 2px solid green;
        }

        /* Different Margin & Padding Values */
        .different-box {
            background-color: lightcoral;
            margin: 10px 50px;
            padding: 5px 30px;
            border: 2px solid red;
        }
    </style>

</head>
<body>

    <h2>Margin Example</h2>
    <div class="margin-box">
        This box has <b>margin: 40px</b><br>
        Margin creates space outside the element.
    </div>

    <h2>Padding Example</h2>
    <div class="padding-box">
        This box has <b>padding: 40px</b><br>
        Padding creates space inside the element.
    </div>

    <h2>Different Margin & Padding Values</h2>
    <div class="different-box">
        Margin: 10px 50px (top-bottom, left-right)<br>
        Padding: 5px 30px
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Navigation & Forms | Pseudo-Classes</title>
    <link rel="stylesheet" href="PseudoClasses.css">
    <meta name="description" content="A demonstration of CSS pseudo-classes for interactive navigation menus and stylized form inputs.">
</head>
<body>

    <header class="simple-header">
        <div class="logo">MySite</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <main>
        <div class="form-container">
            <h2>Get in Touch</h2>
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="4" placeholder="How can we help you?"></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Send Message</button>
            </form>

            <div class="helper-links">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
                <a href="#">Help Center</a>
            </div>
        </div>
    </main>

</body>
</html>
